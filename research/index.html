<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Research — MLCS, Yonsei University</title>
  <meta name="description" content="Research areas of the MLCS Lab, Yonsei University: autonomous vehicles and robotics." />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=Work+Sans:wght@500;600;700;800&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="/css/style.css" />
</head>
<body>

  <header class="nav" id="nav"></header>

  <main class="page">
    <header class="page-head">
      <p class="eyebrow">Research</p>
      <div class="page-head__row">
        <p class="page-head__lead">Two research groups in the MLCS Lab.
        <div class="page-head__tags" data-filter-target=".group"><span class="tag tag--all" data-filter="all">All</span> <span class="tag tag--rob" data-filter="rob">Robotics</span> <span class="tag tag--av" data-filter="av">Autonomous Vehicle</span></div>
      </div>
    </header>

    <section class="section section--tight">

      <details class="group" open>
        <summary class="group__head">
          <span class="group__title">Autonomous Vehicle</span>
          <span class="tag tag--av">AV</span>
        </summary>
        <div class="rlist" id="research-av"></div>
      </details>

      <details class="group" open>
        <summary class="group__head">
          <span class="group__title">Robotics</span>
          <span class="tag tag--rob">Robotics</span>
        </summary>
        <div class="rlist" id="research-rob"></div>
      </details>

    </section>
  </main>

  <footer class="footer" id="contact"></footer>

  <script src="/js/research.js"></script>
  <script src="/js/main.js"></script>
</body>
</html>
